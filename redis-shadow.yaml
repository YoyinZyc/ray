apiVersion: v1
kind: Service
metadata:
  name: redis-shadow
  labels:
    app: redis-shadow
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
  selector:
    app: redis-shadow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-shadow
  labels:
    app: redis-shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-shadow
  template:
    metadata:
      labels:
        app: redis-shadow
    spec:
      containers:
        - name: redis
          image: redis:7.4.0
          ports:
            - containerPort: 6379
