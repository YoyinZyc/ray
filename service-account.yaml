apiVersion: v1
kind: ServiceAccount
metadata:
  name: ray-shadow-head-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ray-shadow-head-role
  namespace: default
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ray-shadow-head-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: ray-shadow-head-sa
  namespace: default
roleRef:
  kind: Role
  name: ray-shadow-head-role
  apiGroup: rbac.authorization.k8s.io
