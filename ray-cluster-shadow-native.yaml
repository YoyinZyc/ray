apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: ray-shadow-head-test-cluster
  namespace: default
spec:
  rayVersion: 2.54.0
  gcsFaultToleranceOptions:
    redisAddress: "redis-shadow:6379"
  headGroupSpec:
    enableShadowHead: true
    rayStartParams:
      dashboard-host: '0.0.0.0'
    template:
      spec:
        serviceAccountName: ray-shadow-head-sa
        containers:
        - name: ray-head
          image: us-central1-docker.pkg.dev/yczhou-gke-dev/shadow-head-repo/ray-shadow-gcs:final-test
          imagePullPolicy: Always
          ports:
          - containerPort: 6379
            name: gcs
          - containerPort: 8265
            name: dashboard
          - containerPort: 10001
            name: client
          env:
          - name: RAY_GCS_SIDECAR_URL
            value: "http://localhost:4040/status"
          - name: RAY_GCS_POLLING_INTERVAL_MS
            value: "500"
          readinessProbe:
            exec:
              command:
              - /bin/bash
              - -c
              - "wget -qO- http://localhost:4040/status | grep '\"is_leader\":true'"
            initialDelaySeconds: 5
            periodSeconds: 5
        - name: ray-gcs-sidecar
          image: us-central1-docker.pkg.dev/yczhou-gke-dev/shadow-head-repo/gcs-sidecar:final-test
          imagePullPolicy: Always
          command: ["/usr/local/bin/gcs_sidecar"]
          args:
          - "--lease-name=ray-gcs-leader-lock"
          - "--lease-namespace=$(POD_NAMESPACE)"
          env:
          - name: POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
  workerGroupSpecs:
  - replicas: 1
    minReplicas: 1
    maxReplicas: 3
    groupName: worker-group
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-worker
          image: rayproject/ray:2.54.0
          ports:
          - containerPort: 10002
            name: client
